<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⏰ Digital Clock - Multiple Timezones</title>
    <link rel="stylesheet" href="clock-style.css">
</head>
<body>
    <div class="clock-container">
        <!-- Header -->
        <header class="clock-header">
            <h1>⏰ Digital Clock</h1>
            <p>Current Time in Different Time Zones</p>
        </header>

        <!-- Controls -->
        <div class="controls">
            <div class="timezone-input">
                <input 
                    type="text" 
                    id="timezoneSearch" 
                    class="search-input" 
                    placeholder="🔍 Search or add timezone..."
                    autocomplete="off"
                >
                <button id="addTimezone" class="btn btn-add">+ Add</button>
            </div>
            <div id="suggestions" class="suggestions-dropdown"></div>
            
            <div class="preset-buttons">
                <button class="preset-btn" onclick="addPresetTimezone('UTC')">UTC</button>
                <button class="preset-btn" onclick="addPresetTimezone('America/New_York')">🗽 New York</button>
                <button class="preset-btn" onclick="addPresetTimezone('Europe/London')">🇬🇧 London</button>
                <button class="preset-btn" onclick="addPresetTimezone('Asia/Tokyo')">🗾 Tokyo</button>
                <button class="preset-btn" onclick="addPresetTimezone('Australia/Sydney')">🇦🇺 Sydney</button>
                <button class="preset-btn" onclick="addPresetTimezone('America/Los_Angeles')">🌴 LA</button>
                <button class="preset-btn" onclick="addPresetTimezone('Europe/Paris')">🇫🇷 Paris</button>
                <button class="preset-btn" onclick="addPresetTimezone('Asia/Dubai')">🇦🇪 Dubai</button>
            </div>
        </div>

        <!-- Clocks Grid -->
        <div id="clocksGrid" class="clocks-grid">
            <!-- Clocks will be added here dynamically -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="empty-state">
            <p>📍 No timezones added yet. Click a preset or search and add a timezone to get started!</p>
        </div>
    </div>

    <script src="clock-app.js"></script>
</body>
</html>
